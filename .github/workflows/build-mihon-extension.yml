name: Build Mihon Extension

on:
  workflow_dispatch:
  push:
    paths:
      - "mihon/android-extension/**"
      - ".github/workflows/build-mihon-extension.yml"
  pull_request:
    paths:
      - "mihon/android-extension/**"
      - ".github/workflows/build-mihon-extension.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mihon/android-extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Build release APK
        run: gradle --no-daemon assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mihon-folder-library-extension-apk
          path: mihon/android-extension/app/build/outputs/apk/release/*.apk
