services:
  folder-library:
    build: .
    container_name: folder-library
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      PORT: 4321
      DATA_DIR: /data
      LIBRARY_ROOT: /library
      SCAN_INTERVAL_MINUTES: 15
    volumes:
      - ./data:/data
      - ./library:/library:ro
