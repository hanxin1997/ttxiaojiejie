<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Folder Library</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Docker + Mihon Extension</p>
          <h1>套图目录整理台</h1>
          <p class="hero-copy">
            扫描图片文件夹，提取封面、漫画名、卷名和章节信息，供 Mihon 扩展按需读取原图。
          </p>
        </div>
        <div class="hero-actions">
          <button id="scan-button" class="action-button action-primary" type="button">立即扫描</button>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel-settings">
          <div class="panel-header">
            <h2>扫描配置</h2>
            <p id="scan-status-text" class="muted"></p>
          </div>

          <form id="settings-form" class="settings-form">
            <label>
              <span>图库根目录</span>
              <input id="library-root" name="libraryRoot" type="text" placeholder="/library" />
            </label>

            <label>
              <span>扫描周期（分钟）</span>
              <input id="scan-interval" name="scanIntervalMinutes" type="number" min="0" />
            </label>

            <div class="inline-grid">
              <label>
                <span>文件夹分隔符</span>
                <input id="separator" name="separator" type="text" maxlength="3" />
              </label>
              <label>
                <span>标题段索引</span>
                <input id="title-segment-index" name="titleSegmentIndex" type="number" min="0" />
              </label>
              <label>
                <span>分类段索引</span>
                <input id="category-segment-index" name="categorySegmentIndex" type="number" min="0" />
              </label>
            </div>

            <label>
              <span>尾部忽略词</span>
              <input id="strip-tokens" name="stripTokens" type="text" placeholder="图片, photos" />
            </label>

            <label>
              <span>叶子目录章节名模板</span>
              <input id="chapter-template" name="directImageChapterTemplate" type="text" placeholder="{count}P" />
            </label>

            <div class="form-actions">
              <button class="action-button action-primary" type="submit">保存配置</button>
            </div>
          </form>

          <div class="section-divider"></div>

          <section class="category-manager">
            <div class="subsection-header library-section-header">
              <div>
                <p class="section-kicker">Category Libraries</p>
                <h3>分类库</h3>
                <p class="muted">参考 Komga 的管理方式：页面只展示已有分类，新增或编辑时再打开独立对话框选择路径。</p>
              </div>
              <div class="toolbar-actions">
                <button id="add-category-button" class="action-button action-primary" type="button">添加分类</button>
              </div>
            </div>

            <div class="library-shelf">
              <div class="library-shelf-head">
                <div>
                  <p class="library-shelf-title">已配置分类</p>
                  <p class="muted">每个分类绑定一个目录。保存后，该目录下的漫画会自动归入对应分类。</p>
                </div>
                <button id="save-category-button" class="action-button" type="button">应用变更</button>
              </div>

              <div id="category-list" class="category-list"></div>
            </div>
          </section>
        </section>

        <section class="panel panel-library">
          <div class="panel-header">
            <h2>图库概览</h2>
            <p id="summary-text" class="muted"></p>
          </div>

          <div class="summary-grid" id="summary-grid"></div>

          <div class="filter-row">
            <label class="filter-field">
              <span>搜索</span>
              <input id="search-input" type="search" placeholder="漫画名 / 原目录名 / 相对路径" />
            </label>
            <label class="filter-field">
              <span>分类</span>
              <select id="category-filter">
                <option value="">全部</option>
              </select>
            </label>
          </div>

          <div id="series-grid" class="series-grid"></div>
        </section>

        <section class="panel panel-detail">
          <div class="panel-header">
            <h2>漫画详情</h2>
            <p id="detail-caption" class="muted">点击左侧卡片查看卷和章节。</p>
          </div>

          <div id="detail-view" class="detail-view empty-state">还没有选中漫画。</div>
        </section>
      </main>
    </div>

    <template id="summary-card-template">
      <article class="summary-card">
        <p class="summary-label"></p>
        <strong class="summary-value"></strong>
      </article>
    </template>

    <section id="category-dialog" class="dialog-shell" hidden aria-hidden="true">
      <div class="dialog-backdrop"></div>
      <div class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="category-dialog-title">
        <div class="dialog-header">
          <div>
            <p class="section-kicker">Category Library</p>
            <h3 id="category-dialog-title">添加分类</h3>
          </div>
          <button class="action-button dialog-close-button" type="button">关闭</button>
        </div>

        <div class="dialog-body">
          <label class="dialog-field">
            <span>分类名称</span>
            <input id="category-dialog-name" type="text" placeholder="例如：清纯写真" />
          </label>

          <label class="dialog-field">
            <span>目录路径</span>
            <div class="dialog-path-row">
              <input id="category-dialog-folder" type="text" placeholder="/library/清纯" readonly />
              <button id="category-dialog-browse" class="action-button" type="button">浏览</button>
            </div>
          </label>
        </div>

        <div class="dialog-footer">
          <button class="action-button" type="button">取消</button>
          <button class="action-button action-primary" type="button">保存分类</button>
        </div>
      </div>
    </section>

    <section id="folder-browser-dialog" class="dialog-shell" hidden aria-hidden="true">
      <div class="dialog-backdrop"></div>
      <div class="dialog-panel dialog-panel-browser" role="dialog" aria-modal="true" aria-labelledby="folder-browser-title">
        <div class="dialog-header">
          <div>
            <p class="section-kicker">Browse Path</p>
            <h3 id="folder-browser-title">选择目录</h3>
          </div>
          <button class="action-button dialog-close-button" type="button">关闭</button>
        </div>

        <div class="dialog-body dialog-browser-body">
          <div class="dialog-path-preview">
            <span>当前路径</span>
            <strong id="folder-browser-current-path">未选择</strong>
          </div>

          <div class="dialog-browser-grid">
            <button id="folder-browser-parent-button" class="browser-item browser-item-parent" type="button">
              返回上级目录
            </button>
            <div id="folder-browser-list" class="browser-list"></div>
          </div>
        </div>

        <div class="dialog-footer">
          <button class="action-button" type="button">取消</button>
          <button id="folder-browser-confirm-button" class="action-button action-primary" type="button">
            选择当前目录
          </button>
        </div>
      </div>
    </section>

    <datalist id="category-suggestions"></datalist>
    <script type="module" src="/app.js"></script>
  </body>
</html>
